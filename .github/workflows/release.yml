name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            asset_name: CNC_robot_control-windows.zip
          - platform: macos
            os: macos-latest
            asset_name: CNC_robot_control-macos.zip
          - platform: linux
            os: ubuntu-latest
            asset_name: CNC_robot_control-linux.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt
          pip install -r requirements.txt

      - name: Build application
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir --name CNC_robot_control src/tk_app/main.py

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Compress-Archive -Path dist/CNC_robot_control -DestinationPath release/${{ matrix.asset_name }} -Force

      - name: Package macOS build
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          ditto -c -k --keepParent dist/CNC_robot_control.app release/${{ matrix.asset_name }}

      - name: Package Linux build
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          tar -czf release/${{ matrix.asset_name }} -C dist CNC_robot_control

      - name: Upload packaged build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/${{ matrix.asset_name }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          name: CNC Robot Control ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          files: release/*
          generate_release_notes: true
